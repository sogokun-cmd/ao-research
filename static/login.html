<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — AOリサーチ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --indigo-deepest: #07111f;
  --indigo-deep:    #0e1a2b;
  --indigo-mid:     #162436;
  --indigo-soft:    #1e3352;
  --indigo-tint:    #e8eef7;
  --indigo-tint2:   #f2f5fb;
  --gold:           #c9a84c;
  --gold-light:     #e8d08a;
  --gold-pale:      #fdf6e3;
  --gold-border:    #e8d08a44;
  --ink:            #1a1a2e;
  --ink-mid:        #344060;
  --ink-soft:       #5a6a8a;
  --ink-muted:      #8a98b5;
  --paper:          #faf8f4;
  --surface:        #ffffff;
  --surface2:       #f5f3ef;
  --border:         #ddd8cf;
  --border-soft:    #ece8e0;
  --red:            #b02a2a;
  --red-light:      #fdf0ee;
  --green:          #1a7a5e;
  --green-light:    #e6f4ef;
  --shadow-gold:    0 2px 16px rgba(201,168,76,.18);
  --shadow:         0 4px 20px rgba(14,26,43,.10), 0 1px 6px rgba(14,26,43,.06);
  --shadow-lg:      0 12px 40px rgba(14,26,43,.14), 0 4px 12px rgba(14,26,43,.08);
  --radius-sm:      6px;
  --radius:         10px;
  --radius-lg:      16px;
  --radius-xl:      24px;
  --font-serif: 'Shippori Mincho', 'Hiragino Mincho ProN', Georgia, serif;
  --font-sans:  'Noto Sans JP', 'Hiragino Sans', 'Meiryo', sans-serif;
  --grad-gold:  linear-gradient(135deg, #c9a84c 0%, #e8d08a 50%, #c9a84c 100%);
  --grad-hero:  linear-gradient(160deg, #07111f 0%, #0e1a2b 40%, #162436 100%);
  --header-h:   68px;
}

body {
  font-family: var(--font-sans);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--indigo-soft); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.site-header {
  height: var(--header-h);
  background: var(--indigo-deep);
  border-bottom: 1px solid rgba(201,168,76,.2);
  display: flex;
  align-items: center;
  padding: 0 36px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(7,17,31,.4);
  flex-shrink: 0;
}

.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.logo-mark {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--grad-gold);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif);
  font-size: 15px; font-weight: 800;
  color: var(--indigo-deep); flex-shrink: 0;
}
.logo-name { font-family: var(--font-serif); font-size: 1.2rem; font-weight: 700; color: #fff; letter-spacing: .02em; }
.logo-sub { display: block; font-size: .65rem; font-weight: 400; color: rgba(255,255,255,.4); letter-spacing: .04em; margin-top: -1px; }

/* Main */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 20px;
}

/* Auth Card */
.auth-card {
  width: 100%;
  max-width: 420px;
}

.auth-header {
  text-align: center;
  margin-bottom: 32px;
}
.auth-eyebrow {
  font-size: .68rem;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.eyebrow-line { width: 20px; height: 1px; background: var(--gold); opacity: .5; }
.auth-title {
  font-family: var(--font-serif);
  font-size: 1.7rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.02em;
}
.auth-sub { font-size: .88rem; color: var(--ink-soft); margin-top: 6px; line-height: 1.65; }

/* Error */
.auth-error {
  background: var(--red-light);
  border: 1px solid #f5c4c0;
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: .84rem;
  color: var(--red);
  margin-bottom: 20px;
  display: flex; align-items: flex-start; gap: 8px;
}
.auth-error-icon { flex-shrink: 0; margin-top: 1px; }

/* Google Button */
.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 12px 20px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: .9rem;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
  text-decoration: none;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.btn-google:hover {
  border-color: #4285f4;
  box-shadow: 0 0 0 3px rgba(66,133,244,.1);
  background: var(--surface);
  text-decoration: none;
}
.btn-google svg { flex-shrink: 0; }

/* Divider */
.auth-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  font-size: .75rem;
  color: var(--ink-muted);
}
.auth-divider::before, .auth-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Form */
.auth-form { display: flex; flex-direction: column; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 7px; }
.form-label { font-size: .78rem; font-weight: 700; color: var(--ink-mid); letter-spacing: .03em; }

input[type="text"],
input[type="email"],
input[type="password"] {
  width: 100%;
  background: var(--paper);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: .92rem;
  padding: 11px 14px;
  outline: none;
  transition: border-color .18s, box-shadow .18s;
}
input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,.15);
}
input::placeholder { color: var(--ink-muted); opacity: .65; }

.btn-submit {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  width: 100%;
  padding: 12px 20px;
  background: var(--grad-gold);
  color: var(--indigo-deep);
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: .92rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: var(--shadow-gold);
  transition: box-shadow .18s, transform .18s;
  margin-top: 6px;
}
.btn-submit:hover {
  box-shadow: 0 4px 20px rgba(201,168,76,.35);
  transform: translateY(-1px);
}
.btn-submit:active { transform: translateY(0); }

/* Footer links */
.auth-footer {
  text-align: center;
  margin-top: 24px;
  font-size: .84rem;
  color: var(--ink-soft);
}
.auth-footer a { color: var(--indigo-soft); font-weight: 600; }
.auth-footer a:hover { color: var(--gold); }

/* Plan badge */
.auth-plan-note {
  margin-top: 20px;
  background: var(--indigo-tint2);
  border: 1px solid #c0ccee;
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: .8rem;
  color: var(--ink-soft);
  display: flex;
  align-items: flex-start;
  gap: 8px;
  line-height: 1.6;
}

/* Footer */
.site-footer {
  background: var(--indigo-deep);
  border-top: 1px solid rgba(201,168,76,.12);
  text-align: center;
  padding: 20px;
  font-size: .72rem;
  color: rgba(255,255,255,.3);
  flex-shrink: 0;
}
.footer-mark { color: rgba(201,168,76,.5); font-weight: 600; }

@media (max-width: 480px) {
  .site-header { padding: 0 16px; }
  main { padding: 32px 16px; }
}
</style>
</head>
<body>

<header class="site-header">
  <a href="/" class="logo">
    <div class="logo-mark">AO</div>
    <div>
      <span class="logo-name">AOリサーチ</span>
      <span class="logo-sub">塾講師の公式情報確認インフラ</span>
    </div>
  </a>
</header>

<main>
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-eyebrow"><span class="eyebrow-line"></span>Sign In<span class="eyebrow-line"></span></div>
      <h1 class="auth-title">ログイン</h1>
      <p class="auth-sub">AOリサーチで総合型選抜の公式情報を<br>素早く確認しましょう。</p>
    </div>

    <div id="error-area"></div>

    <!-- Google Login -->
    <a href="/auth/google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Googleでログイン
    </a>

    <div class="auth-divider">または</div>

    <!-- Email / Password Form -->
    <form class="auth-form" action="/auth/login" method="post">
      <div class="form-group">
        <label class="form-label" for="email">メールアドレス</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">パスワード</label>
        <input type="password" id="password" name="password" placeholder="8文字以上" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
        </svg>
        ログイン
      </button>
    </form>

    <div class="auth-plan-note">
      ℹ️ フリープランでも月3回まで全機能無料でご利用いただけます。
    </div>

    <div class="auth-footer">
      アカウントをお持ちでない方は <a href="/register">新規登録</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <span class="footer-mark">◆ AOリサーチ</span> — 塾講師のための総合型選抜 公式情報確認インフラ
</footer>

<script>
// URL パラメータからエラーメッセージを表示
const params = new URLSearchParams(location.search);
const err = params.get('error');
if (err) {
  document.getElementById('error-area').innerHTML =
    `<div class="auth-error"><span class="auth-error-icon">⚠</span>${err}</div>`;
}
</script>
</body>
</html>
